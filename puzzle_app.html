<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Blululi Puzzle Studio</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#f5f7ff;
}

.app{
max-width:1200px;
margin:auto;
padding:20px;
}

header{
display:flex;
align-items:center;
gap:10px;
font-weight:700;
font-size:20px;
margin-bottom:20px;
}

.layout{
display:grid;
grid-template-columns:320px 1fr;
gap:20px;
}

@media(max-width:900px){
.layout{
grid-template-columns:1fr;
}
}

.panel{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

#board{
display:grid;
gap:2px;
aspect-ratio:1/1;
background:white;
border-radius:16px;
overflow:hidden;
}

.tile{
background-size:cover;
cursor:pointer;
}

button{
border:none;
padding:12px;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.primary{
background:#6d28d9;
color:white;
}

.secondary{
background:#eee;
}

.overlay{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.5);
}

.overlay.show{
display:flex;
}

.overlay-box{
background:white;
padding:30px;
border-radius:20px;
max-width:420px;
text-align:center;
}

</style>

</head>

<body>

<div class="app">

<header>
🧩 Blululi Puzzle Studio
</header>

<div class="layout">

<div class="panel">

<label>Artwork</label>
<select id="imageSelect"></select>

<label>Difficulty</label>
<input id="difficulty" type="range" min="2" max="8" value="4">

<br><br>

<button class="primary" id="shuffleBtn">Shuffle</button>
<button class="secondary" id="resetBtn">Solved</button>

</div>

<div class="panel">

<div id="board"></div>

</div>

</div>

</div>

<div id="overlay" class="overlay">

<div class="overlay-box">

<h2>Puzzle Complete</h2>

<p id="overlayCopy"></p>

<a id="shopBtn" target="_blank">

<button class="primary">Shop This Design</button>

</a>

<br><br>

<button id="againBtn">Play Again</button>

</div>

</div>

<script>

const images = __ASSETS__;
const products = __PRODUCTS__;

const board = document.getElementById("board");
const imageSelect = document.getElementById("imageSelect");
const difficulty = document.getElementById("difficulty");

let grid = 4
let arrangement = []
let moves = 0

function safeProductUrl(index){
return products[index] || products[products.length-1]
}

function populateImages(){

images.forEach((img,i)=>{

const opt=document.createElement("option")
opt.value=i
opt.textContent=img.name

imageSelect.appendChild(opt)

})

}

function shuffleArray(a){

const arr=[...a]

for(let i=arr.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1))

[arr[i],arr[j]]=[arr[j],arr[i]]

}

return arr

}

function renderBoard(){

board.innerHTML=""

board.style.gridTemplateColumns=`repeat(${grid},1fr)`

arrangement.forEach((piece,i)=>{

const tile=document.createElement("div")

tile.className="tile"

tile.style.backgroundImage=`url(${images[piece].url})`

tile.onclick=()=>swap(i)

board.appendChild(tile)

})

}

function swap(i){

if(i===0)return

[arrangement[i],arrangement[0]]=[arrangement[0],arrangement[i]]

moves++

renderBoard()

checkSolved()

}

function checkSolved(){

const ok=arrangement.every((v,i)=>v===i)

if(!ok)return

const overlay=document.getElementById("overlay")

overlay.classList.add("show")

const idx=imageSelect.value

document.getElementById("shopBtn").href=safeProductUrl(idx)

}

function newGame(){

grid=Number(difficulty.value)

const total=grid*grid

arrangement=shuffleArray([...Array(total).keys()])

renderBoard()

}

document.getElementById("shuffleBtn").onclick=newGame

document.getElementById("againBtn").onclick=()=>{

document.getElementById("overlay").classList.remove("show")

newGame()

}

populateImages()

newGame()

</script>

</body>
</html>
